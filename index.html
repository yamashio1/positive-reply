<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="アンチコメントを、受け流しかパルプンテに変える感情デトックスツール。8言語対応。" />
  <meta property="og:title" content="PositiveReply — アンチコメントを、受け流しかパルプンテに" />
  <meta property="og:description" content="書き殴った感情を意味不明な文字列に変換。SNSでの無駄な争いをスマートに回避。" />
  <meta property="og:type" content="website" />
  <title>PositiveReply — アンチコメントを、受け流しに。パルプンテに。</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#F7F0DE" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- BGM pitch-shift engine -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&display=swap');

    :root {
      --bg:        #F7F0DE;
      --bg2:       #FFFBF0;
      --bg3:       #F1E8D2;
      --border:    #E3D7B8;
      --border-strong: #C9B888;
      --text:      #1B3A6B;
      --text2:     #6B6555;
      --text3:     #9A937E;
      --navy:      #1B3A6B;
      --navy-dark: #122B52;
      --red:       #C0392B;
      --red-bg:    rgba(192,57,43,0.08);
      --red-border: rgba(192,57,43,0.35);
      --accent:    #C0392B;
      --accent-bg: rgba(192,57,43,0.08);
      --accent-border: rgba(192,57,43,0.35);
      --danger:    #C0392B;
      --danger-bg: rgba(192,57,43,0.08);
      --radius:    10px;
      --radius-sm: 6px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      --font-serif: "Noto Serif JP", "Source Serif 4", Georgia, serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
      --stripe: repeating-linear-gradient(135deg, var(--navy) 0 16px, transparent 16px 22px, var(--red) 22px 38px, transparent 38px 44px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Airmail stripe band ── */
    .airmail-stripe {
      height: 8px;
      background: var(--stripe);
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 20px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg2);
      flex-wrap: wrap;
    }
    .header-main { flex: 1; min-width: 200px; }
    .logo {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--navy);
      user-select: none;
    }
    .logo span { color: var(--red); }
    .tagline {
      font-size: 13px;
      color: var(--red);
      font-weight: 500;
      margin-top: 6px;
      line-height: 1.5;
    }
    .par-avion-stamp {
      border: 1.5px dashed var(--red);
      padding: 6px 10px;
      transform: rotate(3deg);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .par-avion-stamp span {
      font-size: 9px;
      color: var(--red);
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    /* ── BGM control ── */
    .bgm-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.12s;
    }
    .bgm-toggle:hover { background: var(--bg3); color: var(--text); }
    .bgm-toggle.on {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .bgm-toggle i { font-size: 14px; }
    .bgm-panel {
      display: none;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .bgm-panel.open { display: block; }
    .bgm-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text2);
    }
    .bgm-row + .bgm-row { margin-top: 8px; }
    .bgm-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .bgm-val {
      min-width: 56px;
      text-align: right;
      color: var(--text);
      font-size: 12px;
      font-family: var(--font);
    }
    .bgm-pitch-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      min-width: 64px;
      text-align: center;
    }
    .bgm-step-group {
      display: flex;
      gap: 4px;
    }
    .bgm-step-btn {
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font);
    }
    .bgm-step-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ── BGM mini volume (常時表示) ── */
    .bgm-mini {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .bgm-mini-volume {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bgm-mini-vol-label {
      font-size: 10px;
      color: var(--text3);
      white-space: nowrap;
    }
    .bgm-mini-volume input[type="range"] {
      width: 70px;
      accent-color: var(--accent);
      height: 4px;
    }

    /* ── 開発者用 隠しパネル ── */
    .dev-unlock {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }
    .dev-unlock input[type="password"] {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      width: 100px;
    }
    .dev-unlock button {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--font);
    }
    .dev-unlock button:hover { background: var(--bg2); }

    /* ── Main layout ── */
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ── Section title ── */
    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }

    /* ── Card ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 18px 20px;
      margin-bottom: 14px;
    }

    /* ── Button groups ── */
    .btn-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .lang-grid .btn {
      width: 100%;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (min-width: 460px) {
      .lang-grid { grid-template-columns: repeat(4, 1fr); }
    }
    .btn {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1px solid var(--border-strong);
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.12s;
      font-family: var(--font);
    }
    .btn:hover { background: var(--bg3); color: var(--text); }
    .btn.active {
      background: var(--navy);
      border-color: var(--navy);
      color: var(--bg2);
      font-weight: 500;
    }

    /* ── Type grid ── */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .type-btn {
      padding: 11px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 12px;
      cursor: pointer;
      color: var(--text2);
      text-align: center;
      line-height: 1.5;
      transition: all 0.12s;
      font-family: var(--font);
    }
    .type-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border-strong); }
    .type-btn.active {
      background: var(--red-bg);
      border-color: var(--red);
      color: var(--red);
      font-weight: 500;
    }
    .type-btn small { font-size: 10px; opacity: 0.65; display: block; margin-top: 2px; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    /* ── Input area ── */
    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid var(--border);;
      color: var(--text3);
      transition: all 0.15s;
    }
    .badge.active-input {
      background: var(--danger-bg);
      border-color: rgba(255,79,79,0.4);
      color: var(--danger);
    }
    textarea {
      width: 100%;
      min-height: 80px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      resize: vertical;
      font-family: var(--font);
      line-height: 1.6;
      transition: border-color 0.12s;
    }
    textarea:focus { outline: none; border-color: #444; }
    textarea::placeholder { color: var(--text3); }
    .char-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 5px;
      margin-bottom: 14px;
    }
    .char-count { font-size: 11px; color: var(--text3); }
    .char-count.warn { color: #f0a500; }
    .char-count.over { color: var(--danger); font-weight: 600; }
    .clear-btn {
      font-size: 11px;
      color: var(--text3);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .clear-btn.active {
      opacity: 1;
      pointer-events: auto;
    }
    .clear-btn:hover { color: var(--text2); background: var(--bg3); }

    /* ── Action row ── */
    .action-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .btn-primary {
      padding: 9px 22px;
      border-radius: 99px;
      border: none;
      background: var(--red);
      color: #FFFBF0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.12s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: var(--navy-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      padding: 9px 18px;
      border-radius: 99px;
      border: 1px solid var(--border-strong);
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.12s;
    }
    .btn-secondary:hover { background: var(--bg3); color: var(--text); }
    .btn-secondary:active { transform: scale(0.98); }
    .copied {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(76,140,99,0.12);
      color: #3F7A55;
      border: 1px solid rgba(76,140,99,0.3);
      display: none;
    }
    .phrase-cnt {
      font-size: 11px;
      color: var(--text3);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 99px;
      display: none;
      margin-left: auto;
    }
    .mantra-letters {
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--navy);
      background: var(--bg3);
      border: 1px solid var(--border-strong);
      padding: 6px 14px;
      border-radius: 99px;
      letter-spacing: 1px;
    }

    /* ── Output ── */
    .output-box {
      min-height: 72px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 18px;
      letter-spacing: 1.5px;
      word-break: break-all;
      line-height: 1.9;
      color: var(--navy);
      font-family: var(--font-mono);
    }
    .output-box.phrase { font-size: 14px; letter-spacing: 0; line-height: 1.7; font-family: var(--font); }
    .output-box.empty { color: var(--text3); font-size: 13px; letter-spacing: 0; font-family: var(--font); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: var(--text3);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 400px) {
      .type-grid { grid-template-columns: 1fr; }
      .lang-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="airmail-stripe"></div>

<header>
  <div class="header-main">
    <div class="logo" id="logoClickTarget">Positive<span>Reply</span></div>
    <div class="tagline" id="taglineText">アンチコメントを、受け流し( ^ω^ )〜パルプンテ( °∀° )に！</div>
  </div>
  <div class="par-avion-stamp"><span>PAR AVION</span></div>
  <div class="bgm-mini">
    <button class="bgm-toggle" id="bgmToggle" onclick="toggleBGM()">
      <i class="ti ti-music" aria-hidden="true"></i>
      <span id="bgmToggleLabel">BGM オフ</span>
    </button>
    <div class="bgm-mini-volume">
      <span id="volumeLabelText" class="bgm-mini-vol-label">音量</span>
      <input type="range" id="bgmVolume" min="0" max="100" value="50" oninput="onVolumeChange()">
    </div>
  </div>
</header>

<!-- 開発者用デバッグパネル（通常は非表示。ロゴ5回クリックでパスワード欄が出現） -->
<div class="dev-unlock" id="devUnlock" style="display:none">
  <input type="password" id="devPassword" placeholder="••••" />
  <button onclick="checkDevPassword()">OK</button>
  <button onclick="hideDevUnlock()">×</button>
</div>

<div class="bgm-panel" id="bgmPanel" style="display:none">
  <div class="bgm-row">
    <span style="min-width:70px">現在の曲</span>
    <span class="bgm-pitch-badge" id="trackBadge">bgm_00</span>
    <span style="font-size:11px; color:var(--text3)" id="trackCount">(1曲構成)</span>
  </div>
  <div class="bgm-row">
    <span style="min-width:70px">再生位置</span>
    <input type="range" id="bgmSeek" min="0" max="100" value="0" step="0.1" oninput="onSeekInput()">
    <span class="bgm-val" id="bgmTimeVal">0:00 / 0:00</span>
  </div>
  <div class="bgm-row">
    <span style="min-width:70px">確認用</span>
    <button class="bgm-step-btn" onclick="seekBy(-10)">-10秒</button>
    <button class="bgm-step-btn" onclick="seekBy(10)">+10秒</button>
    <button class="bgm-step-btn" onclick="forceNextTrack()">次の曲へ</button>
  </div>
  <div class="bgm-row">
    <button class="bgm-step-btn" onclick="hideDevPanel()">パネルを閉じる</button>
  </div>
</div>


<main>

  <!-- 言語 -->
  <div class="card">
    <div class="label" id="langSectionLabel">言語 / Region</div>
    <div class="btn-group lang-grid" id="langGroup"></div>

    <div class="divider"></div>

    <!-- 文字モード -->
    <div id="modeWrap">
      <div class="label" id="modeLabel">文字モード</div>
      <div class="btn-group" id="modeGroup"></div>
    </div>

    <!-- 変換タイプ -->
    <div class="label" id="typeLabel">変換タイプ</div>
    <div class="type-grid" id="typeGrid"></div>

    <div class="divider"></div>

    <!-- 入力エリア -->
    <div class="input-header">
      <div class="label" style="margin:0" id="inputLabel">書き殴る（任意・140字まで）</div>
      <span class="badge" id="inputBadge">入力なし → ランダム生成</span>
    </div>
    <textarea id="inputText" placeholder="ここに気持ちを書き殴ってください。入力した文字数に合わせて変換されます。"></textarea>
    <div class="char-row">
      <span class="char-count" id="charCount">0 / 140</span>
      <button class="clear-btn" id="clearBtn" onclick="clearInput()">クリア</button>
    </div>

    <!-- アクション -->
    <div class="action-row">
      <button class="btn-primary" onclick="generate()" id="genBtn">変換する</button>
      <button class="btn-secondary" onclick="copyOutput()" id="copyBtn">コピー</button>
      <span class="mantra-letters" id="mantraLetters" style="display:none"></span>
      <span class="copied" id="copiedBadge">✓ コピーしました</span>
      <span class="phrase-cnt" id="phraseCnt"></span>
    </div>

    <!-- 出力 -->
    <div class="label" id="resultLabel">結果</div>
    <div class="output-box empty" id="outputBox">変換タイプを選んで「変換する」を押してください</div>
  </div>

</main>

<footer>PositiveReply — Emotional Detox Tool &nbsp;·&nbsp; v1.0</footer>

const ALPHA26 = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

function pickMantraLetters(input){
  const raw = input || '';
  const totalLen = [...raw].length; // 入力全体の文字数（記号・日本語等すべて含む）
  const targetCount = totalLen > 0 ? (totalLen <= 5 ? 2 : 3) : (Math.random() < 0.5 ? 2 : 3);

  // 入力からアルファベットのみ抽出、大文字化
  const letters = raw.toUpperCase().replace(/[^A-Z]/g,'');
  let chosen = [];
  if(letters.length >= 2){
    chosen.push(letters[0]); // 最初の文字を必ず含める
    const rest = letters.slice(1).split('');
    while(chosen.length < targetCount && rest.length){
      const idx = Math.floor(Math.random()*rest.length);
      const c = rest.splice(idx,1)[0];
      if(!chosen.includes(c)) chosen.push(c);
      if(rest.length===0) break;
    }
    // 文字種が足りない場合はランダム補充
    while(chosen.length < targetCount){
      const r = ALPHA26[Math.floor(Math.random()*26)];
      if(!chosen.includes(r)) chosen.push(r);
    }
  } else if(letters.length === 1){
    chosen.push(letters[0]);
    while(chosen.length < targetCount){
      const r = ALPHA26[Math.floor(Math.random()*26)];
      if(!chosen.includes(r)) chosen.push(r);
    }
  } else {
    // アルファベットを含まない入力（日本語のみ等）・入力なし → 完全ランダム
    while(chosen.length < targetCount){
      const r = ALPHA26[Math.floor(Math.random()*26)];
      if(!chosen.includes(r)) chosen.push(r);
    }
  }
  return chosen;
}

function buildMiniMantra(input, langCode, presetLetters){
  const l = MANTRA_INTRO[langCode] ? langCode : 'en';
  const letters = presetLetters || pickMantraLetters(input);
  const code = letters.join('');
  const intro = rnd(MANTRA_INTRO[l]).replace('__', `"${code}"`);
  const soto = rnd(MANTRA_SOTO[l]);
  const useVerb = Math.random() < 0.5;
  let line;
  if(useVerb){
    line = letters.map(x => `${rnd(MANTRA_VERB[x]||['Win'])}!`).join(' ');
  } else {
    line = letters.map(x => rnd(MANTRA_ADJ[x]||['Yay!'])).join(' ');
  }
  return `${intro} ${soto}, ${line}`;
}

/* ===================== GENERATORS ===================== */
const rnd = a=>a[~~(Math.random()*a.length)];
const build = (len,pool,def)=>{ if(len<=0)len=def+~~(Math.random()*12); let o=''; for(let i=0;i<len;i++)o+=pool[~~(Math.random()*pool.length)]; return o; };

/* 20文字を超えるたびにランダムで混ぜ込む特殊AA */
const SPECIAL_AA = [
  "∈( ´___________` )∋",
  "⊂≡≡≡( ^ω^)≡≡⊃ Boooon",
  "Yee----(°∀°)----ees!!",
  "(∩ °∀°)⊃⊂(°∀° ∩) Same here!",
  "(∩ ´∀`)⊃⊂(´∀` ∩) Same here!"
];

const buildKao=(len,arr)=>{
  if(len<=0)return rnd(arr);
  let o='', c=0, sinceSpecial=0, threshold=20;
  while(c<len){
    let piece;
    if(sinceSpecial>=threshold){
      piece = rnd(SPECIAL_AA);
      sinceSpecial = 0;
      threshold = 20; // 次の20文字超過まで
    } else {
      piece = rnd(arr);
    }
    o += (o?' ':'') + piece;
    c += piece.length + 1;
    sinceSpecial += piece.length + 1;
  }
  return o.trim().slice(0, len+30);
};
const corruptHalf=(len)=>{ if(len<=0)len=12+~~(Math.random()*10); let o=''; for(let i=0;i<len;i++){const x=Math.random();o+=x<0.2?'\u200B':x<0.38?'\uFFFD':x<0.55?['@','3','!','0','$','#','%','^','&','*'][~~(Math.random()*10)]:C_BASE[~~(Math.random()*C_BASE.length)];} return o; };
const corruptJa=(len)=>{ if(len<=0)len=10+~~(Math.random()*8); let o=''; for(let i=0;i<len;i++)o+=Math.random()<0.5?C_KANA[~~(Math.random()*C_KANA.length)]:C_SUBJA[~~(Math.random()*C_SUBJA.length)]; return o; };
const corruptZh=(len)=>{ if(len<=0)len=10+~~(Math.random()*8); let o=''; for(let i=0;i<len;i++)o+=Math.random()<0.5?C_ZH[~~(Math.random()*C_ZH.length)]:C_SUBZH[~~(Math.random()*C_SUBZH.length)]; return o; };

function _genCommon(type,len,phrases,raw,langCode){
  if(type===4)return buildMiniMantra(raw,langCode);
  if(type===3)return rnd(phrases);
  if(type===1)return buildKao(len,HALF_KAO);
  return corruptHalf(len);
}

function _genJa(mode,type,len,raw){
  if(type===4)return buildMiniMantra(raw,'ja');
  if(type===3)return mode==='half'?rnd(PH_JA_H):rnd(PH_JA_F);
  if(mode==='half'){
    if(type===1)return buildKao(len,HALF_KAO);
    return corruptHalf(len);
  } else {
    if(type===1)return buildKao(len,HALF_KAO);
    return corruptJa(len);
  }
}
function _genEn(type,len,raw){
  if(type===4)return buildMiniMantra(raw,'en');
  if(type===3)return rnd(PH_EN);
  if(type===1)return buildKao(len,HALF_KAO);
  return corruptHalf(len);
}
function _genZh(mode,type,len,raw){
  if(type===4)return buildMiniMantra(raw,'zh');
  if(type===3)return rnd(PH_ZH);
  if(mode==='full'){
    if(type===1)return buildKao(len,HALF_KAO);
    return corruptZh(len);
  } else {
    if(type===1)return buildKao(len,HALF_KAO);
    return corruptHalf(len);
  }
}

/* ===================== CHAR COUNT ===================== */
function countChars(str){ let c=0; for(const ch of str)c+=ch.charCodeAt(0)>255?1:0.5; return Math.ceil(c); }

function onInput(){
  const ta=document.getElementById('inputText');
  let val=ta.value;
  let count=countChars(val);
  if(count>140){ let t='',c=0; for(const ch of val){const w=ch.charCodeAt(0)>255?1:0.5;if(c+w>140)break;t+=ch;c+=w;} ta.value=t; val=t; }
  const cur=countChars(val);
  const el=document.getElementById('charCount');
  el.textContent=cur+' / 140';
  el.className='char-count'+(cur>=130?' over':cur>=100?' warn':'');
  document.getElementById('clearBtn').classList.toggle('active', val.length>0);
  const badge=document.getElementById('inputBadge');
  const c=CONF[lang];
  badge.textContent=val.length>0?c.badgeActive:c.badgeEmpty;
  badge.className='badge'+(val.length>0?' active-input':'');
}

function clearInput(){ document.getElementById('inputText').value=''; onInput(); }

/* ===================== GENERATE ===================== */
function generate(){
  const val=document.getElementById('inputText').value;
  const len=val.length>0?countChars(val):0;
  const mantraBadge=document.getElementById('mantraLetters');
  let out;
  if(type===4){
    const letters=pickMantraLetters(val);
    mantraBadge.textContent=letters.join('');
    mantraBadge.style.display='inline-block';
    out = buildMiniMantra(val, lang, letters);
  } else {
    mantraBadge.style.display='none';
    out=CONF[lang].gen(mode,type,len,val);
  }
  const box=document.getElementById('outputBox');
  box.className='output-box'+((type===3||type===4)?' phrase':'');
  box.textContent=out||'—';
  updatePhraseCount();
}

function copyOutput(){
  const text=document.getElementById('outputBox').textContent;
  if(!text||text==='—'||text.includes('変換タイプ'))return;
  navigator.clipboard.writeText(text).then(()=>{
    const b=document.getElementById('copiedBadge');
    b.style.display='inline';
    setTimeout(()=>b.style.display='none',1800);
  });
}

function updatePhraseCount(){
  const el=document.getElementById('phraseCnt');
  if(type===3){ el.textContent=CONF[lang].phrCount(mode)+CONF[lang].phrSuffix; el.style.display='inline'; }
  else el.style.display='none';
}

function shuffleArray(arr){
  const a = [...arr];
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function renderLangButtons(){
  const g = document.getElementById('langGroup');
  g.innerHTML = '';
  const shuffled = shuffleArray(LANG_LIST);
  shuffled.forEach(l=>{

    b.className = 'btn' + (l.id===lang?' active':'');
    b.dataset.lang = l.id;
    b.textContent = `${l.flag} ${l.name}`;
    b.onclick = () => setLang(l.id);
    g.appendChild(b);
  });

/* ===================== BGM (multi-track key-switching loop) ===================== */
/*
  音源リスト。1曲目は必ず存在するbgm_00.mp3（オリジナルキー）。
  今後 bgm_p03.mp3（+3半音）, bgm_m05.mp3（-5半音）等を追加していく。
  ファイルが存在しない場合は自動的にスキップされる。
*/
const BGM_TRACKS = [
  { file: 'bgm_00.mp3',  label: 'bgm_00（±0）' },
  { file: 'bgm_p02.mp3', label: 'bgm_p02（+2）' },
  { file: 'bgm_p05.mp3', label: 'bgm_p05（+5）' },
  { file: 'bgm_p09.mp3', label: 'bgm_p09（+9）' },
  { file: 'bgm_p12.mp3', label: 'bgm_p12（+12）' },
  { file: 'bgm_m05.mp3', label: 'bgm_m05（-5）' },
  // 今後追加する場合はここに { file: 'bgm_xxx.mp3', label: '...' } を追記
];

function fmtTime(sec){
  if(!isFinite(sec) || sec < 0) sec = 0;
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

async function checkTrackExists(url){
  try{
    const res = await fetch(url, { method: 'HEAD' });
    return res.ok;
  } catch(e){ return false; }
}

async function buildAvailableTrackList(){
  const list = [];
  for(const t of BGM_TRACKS){
    if(await checkTrackExists(t.file)) list.push(t);
  }
  if(list.length === 0) list.push(BGM_TRACKS[0]); // fallback
  return list;
}

function pickNextTrackIndex(){
  if(availableTracks.length <= 1) return 0;
  let next;
  do { next = Math.floor(Math.random() * availableTracks.length); }
  while(next === currentTrackIndex);
  return next;
}

function loadTrack(index){
  return new Promise((resolve, reject) => {
    const track = availableTracks[index];
    if(bgmPlayer){ bgmPlayer.dispose(); }
    bgmPlayer = new Tone.Player({
      url: track.file,
      loop: false,
      autostart: false,
      onload: () => resolve(),
      onerror: (e) => reject(e),
      onstop: () => {
        // 自然終了時のみ次の曲へ（シーク・手動切替時はスキップ）
        if(bgmOn && bgmStarted && !suppressOnStop){
          playNextTrack();
        }
        suppressOnStop = false;
      }
    }).toDestination();
    currentTrackIndex = index;
    document.getElementById('trackBadge').textContent = track.label;
    document.getElementById('trackCount').textContent = '(' + availableTracks.length + '曲構成)';
  });
}

async function playNextTrack(){
  const idx = pickNextTrackIndex();
  await loadTrack(idx);
  onVolumeChange();
  trackOffset = 0;
  trackStartTime = Tone.now();
  bgmPlayer.start();
  startSeekTimer();
}

async function startBGM(){
  const label = document.getElementById('bgmToggleLabel');
  const c = CONF[lang];
  try{
    await Tone.start();
    if(availableTracks.length === 0){
      bgmLoading = true;
      label.textContent = c.bgmLoadingLabel;
      availableTracks = await buildAvailableTrackList();
      bgmLoading = false;
      // 初回再生も6パターンからランダムに選ぶ
      currentTrackIndex = Math.floor(Math.random() * availableTracks.length);
    }
    if(!bgmStarted){
      await loadTrack(currentTrackIndex);
      onVolumeChange();
      trackOffset = 0;
      trackStartTime = Tone.now();
      bgmPlayer.start();
      bgmStarted = true;
      label.textContent = c.bgmOnLabel;
      startSeekTimer();
    }
  } catch(e){
    console.error('BGM load error:', e);
    label.textContent = c.bgmOffLabel;
    bgmOn = false;
    document.getElementById('bgmToggle').classList.remove('on');
    alert('BGMの読み込みに失敗しました。\n\n・index.htmlを直接開いている場合（file://）はローカルサーバー経由か、Vercel等にデプロイした状態でお試しください。\n・bgm_00.mp3がindex.htmlと同じフォルダにあるか確認してください。');
  }
}

function startSeekTimer(){
  if(seekTimer) clearInterval(seekTimer);
  seekTimer = setInterval(updateSeekUI, 250);
}

function updateSeekUI(){
  if(!bgmPlayer || !bgmPlayer.buffer) return;
  const dur = bgmPlayer.buffer.duration;
  const pos = getCurrentPosition();
  const pct = dur > 0 ? (pos / dur) * 100 : 0;
  document.getElementById('bgmSeek').value = pct;
  document.getElementById('bgmTimeVal').textContent = fmtTime(pos) + ' / ' + fmtTime(dur);
}

function getCurrentPosition(){
  if(!bgmPlayer || !bgmStarted) return 0;
  const elapsed = Tone.now() - trackStartTime;
  return Math.min(trackOffset + elapsed, bgmPlayer.buffer ? bgmPlayer.buffer.duration : 0);
}

function toggleBGM(){
  if(bgmLoading) return;
  bgmOn = !bgmOn;
  const btn = document.getElementById('bgmToggle');
  const label = document.getElementById('bgmToggleLabel');
  const c = CONF[lang];
  if(bgmOn){
    btn.classList.add('on');
    startBGM();
  } else {
    btn.classList.remove('on');
    label.textContent = c.bgmOffLabel;
    if(bgmPlayer && bgmStarted){ suppressOnStop = true; bgmPlayer.stop(); bgmStarted = false; }
    if(seekTimer) clearInterval(seekTimer);
  }
}

function onVolumeChange(){
  const v = document.getElementById('bgmVolume').value;
  if(bgmPlayer){
    const db = v === '0' ? -60 : (Number(v)/100) * 20 - 20;
    bgmPlayer.volume.value = db;
  }
}

function onSeekInput(){
  if(!bgmPlayer || !bgmPlayer.buffer || !bgmStarted) return;
  const pct = parseFloat(document.getElementById('bgmSeek').value);
  const dur = bgmPlayer.buffer.duration;
  const target = (pct / 100) * dur;
  document.getElementById('bgmTimeVal').textContent = fmtTime(target) + ' / ' + fmtTime(dur);
  seekToPosition(target);
}

function seekToPosition(target){
  if(!bgmPlayer || !bgmPlayer.buffer || !bgmStarted) return;
  const dur = bgmPlayer.buffer.duration;
  target = Math.max(0, Math.min(target, dur - 0.05));
  suppressOnStop = true;
  bgmPlayer.stop();
  trackOffset = target;
  trackStartTime = Tone.now();
  bgmPlayer.start(undefined, target);
  updateSeekUI();
}

function seekBy(deltaSec){
  if(!bgmPlayer || !bgmPlayer.buffer || !bgmStarted) return;
  const cur = getCurrentPosition();
  seekToPosition(cur + deltaSec);
}

async function forceNextTrack(){
  if(!bgmOn || !bgmStarted) return;
  suppressOnStop = true;
  bgmPlayer.stop();
  await playNextTrack();
}
